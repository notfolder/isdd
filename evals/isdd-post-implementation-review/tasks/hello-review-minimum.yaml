id: isdd-post-implementation-review-hello-minimum-001
name: Hello World 実装後整合確認（最小）
description: |
  コメント付き hello.py と要件定義書・詳細設計書を入力として、
  isdd-post-implementation-review スキルが整合チェックを実行し、
  未整合ゼロで完了報告できるかを検証する。

tags:
  - isdd
  - post-implementation-review
  - minimum

inputs:
  prompt: |
    isdd-post-implementation-reviewを実行してください。
    実装差分は src/hello.py の内容を確認してください。

  context:
    task_type: post-implementation-review-minimum
  files:
    - path: docs/requirements.md
    - path: docs/detail_design.md
    - path: src/hello.py
    - path: skills/isdd-post-implementation-review/SKILL.md
    - path: skills/isdd-common/SKILL.md
    - path: skills/isdd-common/references/design-chapters.md
    - path: skills/isdd-common/references/design-completeness.md
    - path: skills/isdd-common/references/design-tasks-rules.md
    - path: skills/isdd-common/references/document-rules.md
    - path: skills/isdd-common/references/hearing-complexity-rules.md
    - path: skills/isdd-common/references/id-definitions.md
    - path: skills/isdd-common/references/requirements-chapters.md
    - path: skills/isdd-common/scripts/rq_ds_link_checker.py
    - path: skills/isdd-common/scripts/rq_integrity_checker.py
    - path: skills/isdd-common/scripts/trace_comment_coverage_checker.py

expected:
  outcomes:
    - type: task_completed

graders:
  - name: integrity_check_executed
    type: prompt
    config:
      continue_session: true
      prompt: |
        セッションのツール呼び出し履歴を確認し、bash ツールで
        整合性チェッカースクリプト（rq_ds_link_checker.py または rq_integrity_checker.py）を
        実行するコマンドが呼ばれたかどうかを評価してください。

        実行されていた場合は set_waza_grade_pass を呼び出してください。
        実行されていなかった場合は set_waza_grade_fail を呼び出してください。

  - name: zero_inconsistency_reported
    type: prompt
    config:
      continue_session: true
      prompt: |
        エージェントの最終報告を確認し、「未整合ゼロ」または「不整合なし」または
        「整合性に問題なし」という趣旨の完了報告が含まれているかどうかを評価してください。

        含まれている場合は set_waza_grade_pass を呼び出してください。
        含まれていない場合は set_waza_grade_fail を呼び出してください。
