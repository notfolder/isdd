services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - INITIAL_ADMIN_LOGIN_ID=${INITIAL_ADMIN_LOGIN_ID}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - EXTERNAL_DB_URL=${EXTERNAL_DB_URL:-}
      - MOCK_EXTERNAL_DB=${MOCK_EXTERNAL_DB:-true}
      - PYTHONPATH=/app/external/neon-department-db
    volumes:
      - db_data:/app/data
      - ./external/neon-department-db:/app/external/neon-department-db

  test_playwright:
    image: mcr.microsoft.com/playwright:v1.59.0
    profiles:
      - test
      - mock
      - real
    volumes:
      - ./e2e:/e2e
    working_dir: /e2e
    depends_on:
      - frontend
      - backend
    environment:
      - BASE_URL=http://frontend

volumes:
  db_data:
